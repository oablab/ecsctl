# yaml-language-server: $schema=https://raw.githubusercontent.com/oablab/ecsctl/master/schemas/service.schema.json
apiVersion: ecsctl/v1
kind: Service
metadata:
  name: hermes
  cluster: my-cluster
spec:
  image: nousresearch/hermes-agent:latest
  cpu: '1024'
  memory: '2048'
  arch: X86_64
  capacity: FARGATE_SPOT
  desiredCount: 1
  execEnabled: true
  port: 9119
  containerName: hermes
  executionRoleArn: arn:aws:iam::ACCOUNT_ID:role/ecsTaskExecutionRole
  taskRoleArn: arn:aws:iam::ACCOUNT_ID:role/my-task-role
  subnets:
  - subnet-xxx
  securityGroups:
  - sg-xxx
  assignPublicIp: true
  logGroup: /ecs/hermes
  env:
    API_SERVER_ENABLED: 'true'
    API_SERVER_HOST: 0.0.0.0
    API_SERVER_KEY: change-me-generate-with-openssl-rand-hex-32
    HERMES_DASHBOARD: '1'
    HERMES_DASHBOARD_INSECURE: '1'
  command:
  - gateway
  - run
