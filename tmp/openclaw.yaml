# yaml-language-server: $schema=https://raw.githubusercontent.com/oablab/ecsctl/master/schemas/service.schema.json
apiVersion: ecsctl/v1
kind: Service
metadata:
  name: openclaw
  cluster: openab
spec:
  image: ghcr.io/openclaw/openclaw:latest
  cpu: '1024'
  memory: '4096'
  arch: X86_64
  capacity: FARGATE_SPOT
  desiredCount: 1
  execEnabled: true
  port: 18789
  containerName: openclaw
  executionRoleArn: arn:aws:iam::903779448426:role/openab-ecs-execution-role
  taskRoleArn: arn:aws:iam::903779448426:role/openab-ecs-task-chaodu
  subnets:
  - subnet-0564da5939b9f37e8
  securityGroups:
  - sg-0bc22bce7e98d79b0
  assignPublicIp: true
  logGroup: /ecs/openclaw
  env:
    NODE_ENV: production
  secrets:
    OPENCLAW_GATEWAY_TOKEN: 'arn:aws:secretsmanager:us-east-1:903779448426:secret:oab-dHVVk4:OPENCLAW_GATEWAY_TOKEN::'
  command:
  - sh
  - -c
  - |
    mkdir -p /home/node/.openclaw
    cat > /home/node/.openclaw/openclaw.json << 'EOF'
    {"gateway":{"mode":"local","port":18789,"bind":"lan","controlUi":{"dangerouslyAllowHostHeaderOriginFallback":true}},"wizard":{"lastRunAt":"2026-01-01T00:00:00.000Z"}}
    EOF
    exec node dist/index.js gateway --port 18789
